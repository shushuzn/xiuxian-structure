name: Deploy Documentation Site

on:
  push:
    branches: [main]
    paths:
      - "mkdocs.yml"
      - "docs_src/**"
      - "**/*.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: 校验构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Build (strict: D.5 已修复所有 22 个预存 warning)
        run: |
          # D.5: 严格模式构建检查
          # 22 个预存 warning 已全部修复 (新增 总览/魔格/魔职 文件 + 修复链接)
          echo "🔍 mkdocs strict build..."
          mkdocs build --strict
          echo "✅ strict build passed (0 warnings)"
      - name: Verify build artifacts
        run: |
          echo "📊 构建产物统计："
          echo "  - HTML 页面数：$(find site -name '*.html' | wc -l)"
          echo "  - 总大小：$(du -sh site | cut -f1)"
          # 验证关键页面存在
          test -f site/index.html && echo "  - index.html: ✅" || echo "  - index.html: ❌"
          test -f site/索引/index.html && echo "  - 索引: ✅" || echo "  - 索引: ❌"

  deploy:
    name: 部署到 GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Build site
        run: |
          echo "🏗️ mkdocs build..."
          mkdocs build
          echo "✅ build success"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          enable_jekyll: false
          keep_files: false

      - name: Summary
        run: |
          echo "✅ Documentation deployed to GitHub Pages"
          echo "📖 URL: https://shushuzn.github.io/xiuxian-structure/"
          echo "📊 Stats:"
          echo "  - HTML pages: $(find site -name '*.html' | wc -l)"
          echo "  - Total size: $(du -sh site | cut -f1)"