name: Deploy Documentation Site

on:
  push:
    branches: [main]
    paths:
      - "mkdocs.yml"
      - "docs_src/**"
      - "**/*.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install mkdocs mkdocs-material pymdown-extensions

      - name: Build site
        # 不使用 --strict：项目内大量文档使用锚点引用（[#属性] 等），
        # 部分锚点已迁移或重命名，mkdocs 视为 warning 但不影响站点功能。
        # 本地构建仍推荐使用 --strict 验证。
        run: mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          enable_jekyll: false
          keep_files: false

      - name: Summary
        run: |
          echo "✅ Documentation deployed to GitHub Pages"
          echo "📖 URL: https://shushuzn.github.io/xiuxian-structure/"