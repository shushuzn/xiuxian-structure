name: Validate Knowledge Base

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run validation
        run: python scripts/validate.py

      - name: Run export (smoke test)
        run: |
          python scripts/export.py --output /tmp/dist-test
          echo ""
          echo "📦 Export 产物："
          ls -la /tmp/dist-test/ | head -10
          echo ""
          echo "📊 产物统计："
          echo "JSON: $(ls /tmp/dist-test/*.json 2>/dev/null | wc -l) 个"
          echo "CSV:  $(ls /tmp/dist-test/*.csv 2>/dev/null | wc -l) 个"
          echo "MD:   $(ls /tmp/dist-test/*.md 2>/dev/null | wc -l) 个"

      - name: Verify file inventory
        run: |
          echo "📁 目录结构："
          find . -type f -not -path "./.git/*" -not -path "./dist/*" -not -path "./interactive/saves/*" | sort
          echo ""
          echo "📊 文件计数："
          echo "Markdown: $(find . -name '*.md' -not -path './.git/*' -not -path './dist/*' -not -path './interactive/saves/*' | wc -l)"
          echo "YAML: $(find . -name '*.yaml' -not -path './.git/*' | wc -l)"

      - name: Run interactive engine (smoke test)
        run: |
          echo "🎮 跑互动小说引擎（验证状态机 + 剧本解析 + 条件求值）："
          python scripts/interactive.py \
            --story stories/demo_measuring_spirit.md \
            --headless
          echo ""
          echo "✅ 引擎 smoke test 通过"


      - name: Verify all stories are well-formed
        run: |
          echo "🔍 校验所有 stories/ 剧本（连通性 + 节点完整性）："
          python -c "
          import sys
          from pathlib import Path
          sys.path.insert(0, 'scripts')
          from interactive import Story
          stories_dir = Path('stories')
          errors = []
          for md in sorted(stories_dir.glob('*.md')):
              story = Story.from_file(md)
              # 1. 起点存在
              if story.start_node not in story.nodes:
                  errors.append(f'❌ {md.name}: 起点 {story.start_node!r} 不存在')
                  continue
              # 2. BFS 验证所有跳转目标都在
              visited = set()
              queue = [story.start_node]
              while queue:
                  nid = queue.pop(0)
                  if nid in visited: continue
                  visited.add(nid)
                  n = story.get(nid)
                  if n is None:
                      errors.append(f'❌ {md.name}: 节点 {nid!r} 不存在')
                      continue
                  for c in n.choices:
                      tgt = c.get('goto')
                      if tgt not in story.nodes:
                          errors.append(f'❌ {md.name}: {nid} → {tgt!r} 不存在')
                      elif tgt not in visited:
                          queue.append(tgt)
              # 3. 至少一个 ending
              endings = [nid for nid, n in story.nodes.items() if n.type == 'ending']
              if not endings:
                  errors.append(f'❌ {md.name}: 没有任何 ending 节点')
              # 4. 全部连通
              unvisited = set(story.nodes.keys()) - visited
              if unvisited:
                  errors.append(f'❌ {md.name}: 孤儿节点 {unvisited}')
              print(f'  ✅ {md.name}: {len(story.nodes)} 节点 / {len(endings)} 结局 / 全部连通')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print('✅ 所有 stories 校验通过')
          "