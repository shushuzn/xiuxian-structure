name: Validate Knowledge Base

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run validation
        run: python scripts/validate.py

      - name: Run export (smoke test)
        run: |
          python scripts/export.py --output /tmp/dist-test
          echo ""
          echo "📦 Export 产物："
          ls -la /tmp/dist-test/ | head -10
          echo ""
          echo "📊 产物统计："
          echo "JSON: $(ls /tmp/dist-test/*.json 2>/dev/null | wc -l) 个"
          echo "CSV:  $(ls /tmp/dist-test/*.csv 2>/dev/null | wc -l) 个"
          echo "MD:   $(ls /tmp/dist-test/*.md 2>/dev/null | wc -l) 个"

      - name: Verify file inventory
        run: |
          echo "📁 目录结构："
          find . -type f -not -path "./.git/*" -not -path "./dist/*" | sort
          echo ""
          echo "📊 文件计数："
          echo "Markdown: $(find . -name '*.md' -not -path './.git/*' -not -path './dist/*' | wc -l)"
          echo "YAML: $(find . -name '*.yaml' -not -path './.git/*' | wc -l)"