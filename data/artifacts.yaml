  - id: fali
    name: 法力烙印
    description: "以自身法力在法器上留下印记，最基础的方式"
  - id: jingxue
    name: 精血祭炼
    description: "以精血与法器建立更深联系，驱动更顺畅"
  - id: shenshi
    name: 神识绑定
    description: "以神识与法器器灵沟通，高阶法器所需"

