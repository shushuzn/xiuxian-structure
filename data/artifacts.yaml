# 法器体系权威数据

# 法器品级
tiers:
  - id: di_jie
    name: 低阶法器
    required_realm: lianqi
    description: "炼气期可驱动，威力有限"
  - id: zhong_jie
    name: 中阶法器
    required_realm: zhuji
    description: "筑基期可驱动，威力较强"
  - id: gao_jie
    name: 高阶法器
    required_realm: jiedan
    description: "结丹期可驱动，威力霸道"
  - id: fa_bao
    name: 法宝
    required_realm: yuanying
