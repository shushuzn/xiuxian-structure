# 神识体系权威数据（v1.6 新增）
# 神识按境界从低到高排列，包含范围/穿透/离体/附身等核心参数

stages:
  # ── 微神识 ──
  - id: lianqi
    name: 炼气神识
    grade: wei_shen_shi          # 微神识
    range_min_zhang: 3
    range_max_zhang: 10
    range_unit: zhang
    precision: 模糊              # 模糊/清晰/极清晰/具象化
    penetration: 几乎为零
    can_leave_body: false
    can_possess: false
    can_divine_attack: false
    max_artifact_controlled: 1
    applications:
      artifacts: 低阶法器
      talismans: 凡品符箓
      elixirs: 凡品丹药
      formations: 不可
    references:
      - ../神识体系/炼气神识.md

  # ── 小神识 ──
  - id: zhuji
    name: 筑基神识
    grade: xiao_shen_shi          # 小神识
    range_min_zhang: 30
    range_max_zhang: 100
    precision: 清晰
    penetration: 薄墙（< 1 尺）
    can_leave_body: 极短暂（数息）
    can_possess: false
    can_divine_attack: false
    max_artifact_controlled: 3
    applications:
      artifacts: 中阶法器
      talismans: 灵品符箓（可画制）
      elixirs: 灵品丹药
      formations: 凡阵/基础灵阵
    references:
      - ../神识体系/筑基神识.md

  # ── 大神识（质变） ──
  - id: jiedan
    name: 结丹神识
    grade: da_shen_shi            # 大神识
    range_min_zhang: 100
    range_max_zhang: 500
    precision: 极清晰
    penetration: 厚墙（3 尺）/ 数丈岩层
    can_leave_body: 短暂（数十息，距离百丈内）
    can_possess: 炼气期或凡人（数十息至一刻钟）
    can_divine_attack: false
    max_artifact_controlled: 8
    applications:
      artifacts: 高阶法器
      talismans: 宝品符箓（可画制）
      elixirs: 宝品丹药
      formations: 宝阵
    references:
      - ../神识体系/结丹神识.md

  # ── 元神识（终极形态之一） ──
  - id: yuanying
    name: 元婴神识
    grade: yuan_shen_shi          # 元神识
    range_min_zhang: 1500        # 数里-数十里（按 1 里 ≈ 500 丈）
    range_max_zhang: 15000
    precision: 可看神魂
    penetration: 绝大多数禁制与障碍
    can_leave_body: 长时间（数刻至数日）
    can_possess: 结丹期或以下（成功率 80%+），同阶 < 10%
    can_divine_attack: true      # 识战起始境界
    can_seize_body: true         # 夺舍
    max_artifact_controlled: 10+
    applications:
      artifacts: 法宝
      talismans: 仙品符箓（可画制）
      elixirs: 仙品丹药
      formations: 仙阵
    references:
      - ../神识体系/元婴神识.md

# 神识攻击
attacks:
  - id: shi_ci
    name: 识刺
    level: 基础
    min_realm: yuanying
    damage: 剧痛 + 短暂失神（数息）
    consume_shen_shi: 5%
    description: "神识化作针刺，刺入对方神魂"
    references:
      - ../神识体系/神识攻击.md

  - id: shi_bao
    name: 识爆
    level: 中级
    min_realm: yuanying
    min_sub_stage: zhongqi        # 元婴中期以上
    damage: 神魂重创 + 昏迷（数十息至数刻）+ 修为倒退风险
    consume_shen_shi: 20-30%
    description: "神识在对方神魂中爆开，产生强烈震荡"
    risk: "对方神识相近时可反冲"
    references:
      - ../神识体系/神识攻击.md

  - id: shi_yu
    name: 识域
    level: 高级
    min_realm: yuanying
    min_sub_stage: houqi          # 元婴后期以上
    damage: 范围内所有神识弱于施术者两个大境界的修士，神识完全压制
    consume_shen_shi: 5-10%/刻钟
    description: "神识形成压制性领域"
    applications: 战场清场 / 禁锢低阶 / 保护自身
    references:
      - ../神识体系/神识攻击.md

  - id: shi_mie
    name: 识灭
    level: 禁忌
    min_realm: huashen
    damage: 对方神魂俱灭
    description: "以自身神识毁灭对方神魂，同归于尽式攻击"
    note: 极少使用，被视为禁忌
    references:
      - ../神识体系/神识攻击.md

# 神识功法类型
techniques_categories:
  - id: shen_shi_xiu_lian
    name: 神识修炼类
    effect: 永久增加神识范围
    examples: 静心诀 / 凝神诀 / 灵识功 / 元神诀
  - id: shen_shi_zhan
    name: 神识战斗类
    effect: 强化识战能力
    examples: 识海真经 / 灭神大法
  - id: yuan_shen_xiu_lian
    name: 元神修炼类（元婴以上）
    effect: 元神离体、强化附身/夺舍能力
    examples: 元神大法 / 神游功

# 神识等级（粗分）
grades:
  - id: wei_shen_shi
    name: 微神识
    realm: 炼气期
  - id: xiao_shen_shi
    name: 小神识
    realm: 筑基期
  - id: da_shen_shi
    name: 大神识
    realm: 结丹期
  - id: yuan_shen_shi
    name: 元神识
    realm: 元婴期+