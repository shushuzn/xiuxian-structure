# 宗门.yaml — 势力体系权威数据

# 势力规模
scales:
  - id: san_xiu
    name: 散修/小家族
    member_count: "1-10"
    max_realm: lianqi
    lingmai_required: wei_xing_lingmai
  - id: xiao_sect
    name: 小型宗门
    member_count: "10-500"
    max_realm: zhuji
    lingmai_required: xiao_xing_lingmai
  - id: zhong_sect
    name: 中型宗门
    member_count: "500-5000"
    max_realm: jiedan
    lingmai_required: zhong_xing_lingmai
