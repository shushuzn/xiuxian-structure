# 心魔体系权威数据（v1.5+）
# 心魔按佛教"三毒+执念"四分

types:
  - id: tan_mo
    name: 贪魔
    description: "源于对权势、财货、寿元、力量的贪求"
    bind_realm: lianqi            # 主要触发境界
    severity: 中
    references:
      - ../心魔体系/贪魔.md

  - id: chen_mo
    name: 嗔魔
    description: "源于怨愤、嗔怒、杀心"
    bind_realm: yuanying
    severity: 高
    references:
      - ../心魔体系/嗔魔.md

  - id: chi_mo
    name: 痴魔
    description: "源于对道、法、理的痴迷与固执"
    bind_realm: huashen
    severity: 高
    references:
      - ../心魔体系/痴魔.md

  - id: zhi_nian_mo
    name: 执念魔
    description: "源于对某人、某事、某物的执念"
    bind_realm: jiedan
    severity: 中
    references:
      - ../心魔体系/执念魔.md

# 应对丹药
counter_elixirs:
  - id: all
    name: 所有心魔（聚合）
    description: "4 类心魔的统称，用于跨体系关联的占位"
    references:
      - ../心魔体系/心魔.md
  - id: qing_xin_dan
    name: 清心丹
    counters: [tan_mo, chen_mo, chi_mo, zhi_nian_mo]
    references:
      - ../丹药体系/清心丹.md

  - id: ning_shen_dan
    name: 凝神丹
    counters: [chi_mo, zhi_nian_mo]
    references:
      - ../丹药体系/凝神丹.md