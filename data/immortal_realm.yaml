    name: 火仙劫
    frequency: 8000
    type: 火
    effect: 神魂强度大幅提升
    failure: 神魂焚毁
  - id: feng_xian_jie
    name: 风仙劫
    frequency: 12000
    type: 风
    effect: 心境圆满
    failure: 心境崩溃，沦为魔头
