# 跨体系关联关系
# 用于生成 mermaid 关系图
# 格式: { from: "{体系}:{id}", to: "{体系}:{id}", type, description }

relations:
  # ── 灵根 → 境界 ──
  - from: spirit_root:tian_ling_gen
    to: realm:lianqi
    type: influences
    description: "天灵根突破瓶颈天生占优"
  - from: spirit_root:wei_ling_gen
    to: realm:zhuji
    type: blocks
    description: "伪灵根每突破一个境界都比天灵根难数倍"

  # ── 灵根 → 功法 ──
  - from: spirit_root:tian_ling_gen
    to: technique:chang_sheng_jue
    type: enables
    description: "天灵根与天级无属性功法匹配"
  - from: attributes:jin
    to: technique:jin_jian_jue
    type: enables
    description: "金属性灵根与金属性功法匹配"

  # ── 灵气 → 境界 ──
  - from: aether:xi_bao
    to: realm:lianqi
    type: enables
    description: "稀薄灵气下炼气期尚可"
  - from: aether:nong_yu
    to: realm:jiedan
    type: enables
    description: "浓郁灵气支持高阶修士修炼"

  # ── 灵气 → 灵脉 → 势力 ──
  - from: aether:wei_xing_lingmai
    to: org:san_xiu
    type: enables
    description: "微型灵脉支持散修或小家族"

  # ── 功法 → 境界 ──
  - from: technique:huang
    to: realm:zhuji
    type: blocks
    description: "黄级功法最高到筑基"
  - from: technique:xuan
    to: realm:jiedan
    type: enables
    description: "玄级可到结丹"
  - from: technique:di
    to: realm:huashen
    type: enables
    description: "地级可到元婴甚至化神"
  - from: technique:tian
    to: realm:dacheng
    type: enables
    description: "天级才能走得更远"

  # ── 丹药 → 境界 ──
  - from: elixir:fan_pin
    to: realm:lianqi
    type: enables
    description: "凡品丹药 → 炼气期"
  - from: elixir:ling_pin
    to: realm:zhuji
    type: enables
    description: "灵品丹药 → 筑基期"
  - from: elixir:bao_pin
    to: realm:jiedan
    type: enables
    description: "宝品丹药 → 结丹期"
  - from: elixir:xian_pin
    to: realm:yuanying
    type: enables
    description: "仙品丹药 → 元婴期及以上"

  # ── 丹药 → 突破 ──
  - from: elixir:zhuji_dan
    to: realm:zhuji
    type: enables
    description: "筑基丹辅助炼气突破筑基"
  - from: elixir:jiedan_dan
    to: realm:jiedan
    type: enables
    description: "结丹丹辅助筑基突破结丹"
  - from: elixir:peiyu_dan
    to: realm:yuanying
    type: enables
    description: "培婴丹辅助结丹突破元婴"

  # ── v1.5: 境界 → 雷劫 ──
  - from: realm:jiedan
    to: tribulation:san_jiu_tian_jie
    type: requires
    description: "结丹突破元婴必经三九天劫（9 道雷）"
  - from: realm:yuanying
    to: tribulation:liu_jiu_tian_jie
    type: requires
    description: "元婴突破化神必经六九天劫（18 道雷）"
  - from: realm:huashen
    to: tribulation:liu_jiu_tian_jie
    type: requires
    description: "化神突破炼虚亦经六九天劫"
  - from: realm:lianxu
    to: tribulation:jiu_jiu_tian_jie
    type: requires
    description: "炼虚突破合体必经九九天劫（27 道雷）"
  - from: realm:heti
    to: tribulation:jiu_jiu_tian_jie
    type: requires
    description: "合体突破渡劫亦经九九天劫"
  - from: realm:dujie
    to: tribulation:jiu_jiu_tian_jie_feisheng
    type: requires
    description: "渡劫突破大乘经飞升之劫（九九天劫的极巅）"

  # ── v1.5: 境界 → 心魔 ──
  - from: realm:zhuji
    to: heart_demon:tan_mo
    type: blocks
    description: "筑基突破结丹时贪魔较常见"
  - from: realm:jiedan
    to: heart_demon:zhi_nian_mo
    type: blocks
    description: "结丹突破元婴时执念魔高发"
  - from: realm:yuanying
    to: heart_demon:chi_mo
    type: blocks
    description: "元婴突破化神时嗔魔高发（对天道之愤）"
  - from: realm:huashen
    to: heart_demon:chi_mo
    type: blocks
    description: "化神突破炼虚亦高发嗔魔、痴魔"

  # ── v1.5: 雷劫 ↔ 心魔 ──
  - from: tribulation:san_jiu_tian_jie
    to: heart_demon:tan_mo
    type: triggers
    description: "三九天劫常与贪魔、执念魔并发"
  - from: tribulation:liu_jiu_tian_jie
    to: heart_demon:chi_mo
    type: triggers
    description: "六九天劫常与嗔魔、痴魔并发"
  - from: tribulation:jiu_jiu_tian_jie
    to: heart_demon:all
    type: triggers
    description: "九九天劫常与所有心魔并发"

  # ── v1.5: 丹药 → 心魔（新增抗心魔类） ──
  - from: elixir:qing_xin_dan
    to: heart_demon:tan_mo
    type: enables
    description: "清心丹压制贪魔、嗔魔、痴魔"
  - from: elixir:qing_xin_dan_advanced
    to: heart_demon:zhi_nian_mo
    type: enables
    description: "宝品清心丹可抵御执念魔"
  - from: elixir:ning_shen_dan
    to: heart_demon:chi_mo
    type: enables
    description: "凝神丹稳固神魂，抵御痴魔、执念魔"

  # ── v1.5: 阵法 → 雷劫 ──
  - from: formation:du_jie_zhen
    to: tribulation:san_jiu_tian_jie
    type: weakens
    description: "渡劫阵可削弱三九天劫 30% 威力"
  - from: formation:du_jie_zhen
    to: tribulation:liu_jiu_tian_jie
    type: weakens
    description: "仙阵级别渡劫阵可削弱六九天劫"
  - from: formation:du_jie_zhen
    to: tribulation:jiu_jiu_tian_jie
    type: weakens
    description: "高阶渡劫阵可削弱九九天劫（仅部分）"

  # ── v1.6: 境界 → 神识 ──
  - from: realm:lianqi
    to: divine_sense:lianqi
    type: enables
    description: "炼气期开启微神识（3-10 丈，模糊感知）"
  - from: realm:zhuji
    to: divine_sense:zhuji
    type: enables
    description: "筑基期神识扩展至 30-100 丈，可画符/炼丹/布阵"
  - from: realm:jiedan
    to: divine_sense:jiedan
    type: enables
    description: "结丹期神识质变（穿墙透视、可附身低阶）"
  - from: realm:yuanying
    to: divine_sense:yuanying
    type: enables
    description: "元婴期神识离体化（识战、夺舍、可触及天地法则）"

  # ── v1.6: 神识 → 应用 ──
  - from: divine_sense:jiedan
    to: artifact:gao_jie
    type: enables
    description: "结丹神识可驱动高阶法器"
  - from: divine_sense:yuanying
    to: artifact:fa_bao
    type: enables
    description: "元婴神识可驱动法宝，可与器灵沟通"
  - from: divine_sense:zhuji
    to: talisman:ling_fu
    type: enables
    description: "筑基神识可画制灵品符箓"
  - from: divine_sense:jiedan
    to: talisman:bao_fu
    type: enables
    description: "结丹神识可画制宝品符箓"
  - from: divine_sense:zhuji
    to: elixir:ling_pin
    type: enables
    description: "筑基神识可炼制灵品丹药"
  - from: divine_sense:jiedan
    to: elixir:bao_pin
    type: enables
    description: "结丹神识可炼制宝品丹药"
  - from: divine_sense:zhuji
    to: formation:ling_zhen
    type: enables
    description: "筑基神识可布置灵阵"
  - from: divine_sense:jiedan
    to: formation:bao_zhen
    type: enables
    description: "结丹神识可布置宝阵"

  # ── v1.6: 心魔 ↔ 神识 ──
  - from: divine_sense:yuanying
    to: heart_demon:all
    type: blocks
    description: "元婴期强大神识更难被心魔攻破"
  - from: heart_demon:chi_mo
    to: divine_sense:yuanying
    type: weakens
    description: "嗔魔爆发可短暂削弱神识强度"

  # ── v1.7: 法器 → 器灵 ──
  - from: artifact:fa_bao
    to: spirit_weapon:chu_xing
    type: enables
    description: "法宝级法器可蕴含器灵雏形"
  - from: artifact:ling_bao
    to: spirit_weapon:wan_zheng
    type: enables
    description: "灵宝级法器蕴含完整器灵，可自主行动"
  - from: artifact:fa_bao
    to: spirit_weapon:yi_shi
    type: requires
    description: "法宝级以上法器需仪式认主"

  # ── v1.7: 器灵 ↔ 心魔 ──
  - from: heart_demon:chi_mo
    to: spirit_weapon:backlash
    type: triggers
    description: "嗔魔爆发可激发器灵反噬"
  - from: heart_demon:zhi_nian_mo
    to: spirit_weapon:backlash
    type: triggers
    description: "执念魔爆发可激发器灵反噬"
  - from: spirit_weapon:zi_yuan
    to: heart_demon:all
    type: blocks
    description: "自愿认主的器灵关系稳固，不易受心魔激发反噬"

  # ── v1.7: 雷劫 → 器灵成长 ──
  - from: tribulation:san_jiu_tian_jie
    to: spirit_weapon:du_jie
    type: enables
    description: "三九天劫可催生器灵雏形"
  - from: tribulation:liu_jiu_tian_jie
    to: spirit_weapon:du_jie
    type: enables
    description: "六九天劫可使器灵跃升至完整"
  - from: tribulation:jiu_jiu_tian_jie
    to: spirit_weapon:du_jie
    type: enables
    description: "九九天劫可使器灵跃升至大成"

  # ── v1.7: 神识 → 器灵沟通 ──
  - from: divine_sense:yuanying
    to: spirit_weapon:dui_hua
    type: enables
    description: "元婴神识可与完整器灵神识对话"
  - from: realm:huashen
    to: spirit_weapon:xin_xi
    type: enables
    description: "化神神识可与大成器灵心意相通"

  # ── v1.7: 灵兽 → 契约 ──
  - from: spirit_beast:ling_pin
    to: contract:soul_contract
    type: enables
    description: "灵兽多走灵魂契约（本命契约）"
  - from: spirit_beast:ling_pin
    to: contract:master_servant
    type: enables
    description: "被俘灵兽多走主从契约"
  - from: yao_xiu:hua_xing
    to: contract:equal_contract
    type: enables
    description: "化形期妖修与人类修士多走平等契约"
  - from: org:top_sect
    to: contract:equal_contract
    type: enables
    description: "宗门之间多走平等盟约"

  # ── v1.7: 契约 ↔ 心魔 ──
  - from: contract:master_servant
    to: heart_demon:chi_mo
    type: triggers
    description: "主从契约的灵兽易积怨，激发嗔魔"
  - from: contract:soul_bond
    to: heart_demon:zhi_nian_mo
    type: triggers
    description: "魂契的极端绑定易转化为执念魔"

  # ── v1.7: 法器 → 灵兽袋（主从契约载体） ──
  - from: artifact:ling_shou_dai
    to: contract:master_servant
    type: requires
    description: "灵兽袋内的灵兽自动签主从契约"

# ── v1.7: 魂契 ↔ 器灵认主 ──
  - from: contract:soul_bond
    to: recognition_methods:ping_deng
    type: parallels
    description: "魂契是契约体系的极致，与器灵体系的平等共生互为镜像"

  # ── v2.0: 境界 → 飞升 ──
  - from: realm:dujie
    to: ascension:ascension_tribulation
    type: requires
    description: "渡劫期→大乘期突破时需渡飞升之劫"
  - from: realm:dacheng
    to: ascension:ascension_tribulation
    type: triggers
    description: "大乘期成功渡过飞升之劫方可飞升"

  # ── v2.0: 飞升 → 仙界 ──
  - from: ascension:ascension_tribulation
    to: ascension:unidirectional
    type: requires
    description: "飞升需穿越单向界面壁障"
  - from: ascension:unidirectional
    to: realms:xian_jie
    type: enables
    description: "穿越单向壁障后进入仙界"

  # ── v2.0: 雷劫 → 飞升之劫 ──
  - from: tribulation:jiu_jiu_tian_jie_feisheng
    to: ascension:ascension_tribulation
    type: equals
    description: "飞升之劫即九九天劫的最后 3 道（28-30 道）"

  # ── v2.0: 心魔 → 飞升 ──
  - from: heart_demon:zhi_nian_mo
    to: ascension:ascension_tribulation
    type: blocks
    description: "执念魔未除者无法成功飞升"
  - from: heart_demon:chi_mo
    to: ascension:ascension_tribulation
    type: blocks
    description: "嗔魔爆发可使飞升失败（道消）"

  # ── v2.0: 仙界 ↔ 下界 ──
  - from: realms:xian_jie
    to: ascension:unidirectional
    type: blocks
    description: "单向壁障阻止飞升者返回下界"
  - from: realms:xian_jie
    to: factions:tian_ting
    type: enables
    description: "仙界正统王朝管理所有飞升者"

  # ── v2.0: 仙灵石 ↔ 下界灵石 ──
  - from: spirit_stone:ji_pin
    to: spirit_stone:xian_pin
    type: parallels
    description: "极品灵石是仙灵石的下界对应物"

  # ── v2.0: 功法 → 仙界功法 ──
  - from: technique:tian
    to: techniques:tian_yan_xian_dian
    type: parallels
    description: "下界天级功法是仙界仙级功法的雏形"

# ── v2.0: 下界势力 → 飞升 ──
  - from: org:top_sect
    to: immortal_realm:tian_ting
    type: parallels
    description: "下界顶级宗门对应仙界天庭"

  # ── v2.0: 飞升者 → 仙职 ──
  - from: ascension:ordinary
    to: titles:san_xian
    type: enables
    description: "普通飞升者飞升后从散仙做起"

  # ── v2.0: 仙界势力 → 下界飞升者 ──
  - from: factions:tian_ting
    to: ascension:join_sect
    type: enables
    description: "仙界天庭提供飞升者最常见的加入路径"

  # ── v2.0: 仙劫 → 仙界功法 ──
  - from: immortal_tribulations:lei_xian_jie
    to: techniques:tian_yan_xian_dian
    type: requires
    description: "雷仙劫需要法则感悟类功法应对"

  # ── v2.0: 仙灵石 → 仙界功法 ──
  - from: spirit_stone:xian_pin
    to: techniques:jiu_zhuan_xuan_xian_jue
    type: enables
    description: "仙灵石是修炼九转玄仙诀的资源基础"

  # ── v2.3: 神界 → 仙界 ──
  - from: barrier_types:sealed
    to: divine_grades:fan_ren
    type: parallels
    description: "飞升需渡神劫后获神格"
  - from: titles:xian_di
    to: titles:shen_min
    type: parallels
    description: "仙帝级存在渡神劫后从神民起步"

  # ── v2.3: 仙界 → 神界 ──
  - from: titles:xian_di
    to: tribulations:lei_shen_jie
    type: requires
    description: "仙帝需渡雷神劫才能进入神界"
  - from: titles:xian_di
    to: tribulations:fu_he_shen_jie
    type: parallels
    description: "仙帝级存在面临最严苛的复合神劫"

  # ── v2.3: 神格 → 神职 ──
  - from: divine_grades:fan_ren
    to: titles:shen_min
    type: enables
    description: "凡人神格起步只能任神民"
  - from: divine_grades:zhi_shen
    to: titles:shen_di
    type: enables
    description: "至神格可任神帝"

  # ── v2.3: 神界资源 ──
  - from: spirit_stones:xian_jing
    to: spirit_stones:shen_jing
    type: parallels
    description: "仙晶是神晶的下界对应物"
  - from: aether:nong_yu
    to: aether:nong_yu_shen
    type: parallels
    description: "浓郁灵气对应浓郁神气"

  # ── v2.3: 神劫 ↔ 心魔 ──
  - from: heart_demon:chi_mo
    to: tribulations:xin_mo_shen_jie
    type: triggers
    description: "嗔魔在心魔神劫中具象化"
  - from: heart_demon:zhi_nian_mo
    to: tribulations:xin_mo_shen_jie
    type: blocks
    description: "执念魔未除者无法渡心魔神劫"

  # ── v2.3: 飞神者路径 ──
  - from: ascension:ordinary
    to: ascension_types:ordinary_ascension
    type: parallels
    description: "普通飞升者到神界仍为普通飞神者"
  - from: ascension:talented
    to: ascension_types:talented_ascension
    type: parallels
    description: "天才飞升者到神界仍为天才飞神者"

  # ── v2.3: 神界势力 → 神域 ──
  - from: factions:tian_ting
    to: domains:tian_ting
    type: parallels
    description: "仙界天庭对应神界天庭"