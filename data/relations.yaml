# 跨体系关联关系
# 用于生成 mermaid 关系图
# 格式: { from: "{体系}:{id}", to: "{体系}:{id}", type, description }

relations:
  # ── 灵根 → 境界 ──
  - from: spirit_root:tian_ling_gen
    to: realm:lianqi
    type: influences
    description: "天灵根突破瓶颈天生占优"
  - from: spirit_root:wei_ling_gen
    to: realm:zhuji
    type: blocks
    description: "伪灵根每突破一个境界都比天灵根难数倍"

  # ── 灵根 → 功法 ──
  - from: spirit_root:tian_ling_gen
    to: technique:chang_sheng_jue
    type: enables
    description: "天灵根与天级无属性功法匹配"
  - from: spirit_root:jin_ling_gen
    to: technique:jin_jian_jue
    type: enables
    description: "金属性灵根与金属性功法匹配"

  # ── 灵气 → 境界 ──
  - from: aether:xi_bao
    to: realm:lianqi
    type: enables
    description: "稀薄灵气下炼气期尚可"
  - from: aether:nong_yu
    to: realm:jiedan
    type: enables
    description: "浓郁灵气支持高阶修士修炼"

  # ── 灵气 → 灵脉 → 势力 ──
  - from: aether:wei_xing_lingmai
    to: org:san_xiu
    type: enables
    description: "微型灵脉支持散修或小家族"

  # ── 功法 → 境界 ──
  - from: technique:tier_huang
    to: realm:zhuji
    type: blocks
    description: "黄级功法最高到筑基"
  - from: technique:tier_xuan
    to: realm:jiedan
    type: enables
    description: "玄级可到结丹"
  - from: technique:tier_di
    to: realm:huashen
    type: enables
    description: "地级可到元婴甚至化神"
  - from: technique:tier_tian
    to: realm:dacheng
    type: enables
    description: "天级才能走得更远"

  # ── 丹药 → 境界 ──
  - from: elixir:tier_fan_pin
    to: realm:lianqi
    type: enables
    description: "凡品丹药 → 炼气期"
  - from: elixir:tier_ling_pin
    to: realm:zhuji
    type: enables
    description: "灵品丹药 → 筑基期"
  - from: elixir:tier_bao_pin
    to: realm:jiedan
    type: enables
    description: "宝品丹药 → 结丹期"
  - from: elixir:tier_xian_pin
    to: realm:yuanying
    type: enables
    description: "仙品丹药 → 元婴期及以上"

  # ── 丹药 → 突破 ──
  - from: elixir:zhuji_dan
    to: realm:zhuji
    type: enables
    description: "筑基丹辅助炼气突破筑基"
  - from: elixir:jiedan_dan
    to: realm:jiedan
    type: enables
    description: "结丹丹辅助筑基突破结丹"
  - from: elixir:peiyu_dan
    to: realm:yuanying
    type: enables
    description: "培婴丹辅助结丹突破元婴"

  # ── v1.5: 境界 → 雷劫 ──
  - from: realm:jiedan
    to: tribulation:san_jiu_tian_jie
    type: requires
    description: "结丹突破元婴必经三九天劫（9 道雷）"
  - from: realm:yuanying
    to: tribulation:liu_jiu_tian_jie
    type: requires
    description: "元婴突破化神必经六九天劫（18 道雷）"
  - from: realm:huashen
    to: tribulation:liu_jiu_tian_jie
    type: requires
    description: "化神突破炼虚亦经六九天劫"
  - from: realm:lianxu
    to: tribulation:jiu_jiu_tian_jie
    type: requires
    description: "炼虚突破合体必经九九天劫（27 道雷）"
  - from: realm:heti
    to: tribulation:jiu_jiu_tian_jie
    type: requires
    description: "合体突破渡劫亦经九九天劫"
  - from: realm:dujie
    to: tribulation:jiu_jiu_tian_jie_feisheng
    type: requires
    description: "渡劫突破大乘经飞升之劫（九九天劫的极巅）"

  # ── v1.5: 境界 → 心魔 ──
  - from: realm:zhuji
    to: heart_demon:tan_mo
    type: blocks
    description: "筑基突破结丹时贪魔较常见"
  - from: realm:jiedan
    to: heart_demon:zhi_nian_mo
    type: blocks
    description: "结丹突破元婴时执念魔高发"
  - from: realm:yuanying
    to: heart_demon:chi_mo
    type: blocks
    description: "元婴突破化神时嗔魔高发（对天道之愤）"
  - from: realm:huashen
    to: heart_demon:chi_mo
    type: blocks
    description: "化神突破炼虚亦高发嗔魔、痴魔"

  # ── v1.5: 雷劫 ↔ 心魔 ──
  - from: tribulation:san_jiu_tian_jie
    to: heart_demon:tan_mo
    type: triggers
    description: "三九天劫常与贪魔、执念魔并发"
  - from: tribulation:liu_jiu_tian_jie
    to: heart_demon:chi_mo
    type: triggers
    description: "六九天劫常与嗔魔、痴魔并发"
  - from: tribulation:jiu_jiu_tian_jie
    to: heart_demon:all
    type: triggers
    description: "九九天劫常与所有心魔并发"

  # ── v1.5: 丹药 → 心魔（新增抗心魔类） ──
  - from: elixir:qing_xin_dan
    to: heart_demon:tan_mo
    type: enables
    description: "清心丹压制贪魔、嗔魔、痴魔"
  - from: elixir:qing_xin_dan_advanced
    to: heart_demon:zhi_nian_mo
    type: enables
    description: "宝品清心丹可抵御执念魔"
  - from: elixir:ning_shen_dan
    to: heart_demon:chi_mo
    type: enables
    description: "凝神丹稳固神魂，抵御痴魔、执念魔"

  # ── v1.5: 阵法 → 雷劫 ──
  - from: formation:du_jie_zhen
    to: tribulation:san_jiu_tian_jie
    type: weakens
    description: "渡劫阵可削弱三九天劫 30% 威力"
  - from: formation:du_jie_zhen
    to: tribulation:liu_jiu_tian_jie
    type: weakens
    description: "仙阵级别渡劫阵可削弱六九天劫"
  - from: formation:du_jie_zhen
    to: tribulation:jiu_jiu_tian_jie
    type: weakens
    description: "高阶渡劫阵可削弱九九天劫（仅部分）"

  # ── v1.6: 境界 → 神识 ──
  - from: realm:lianqi
    to: divine_sense:lianqi
    type: enables
    description: "炼气期开启微神识（3-10 丈，模糊感知）"
  - from: realm:zhuji
    to: divine_sense:zhuji
    type: enables
    description: "筑基期神识扩展至 30-100 丈，可画符/炼丹/布阵"
  - from: realm:jiedan
    to: divine_sense:jiedan
    type: enables
    description: "结丹期神识质变（穿墙透视、可附身低阶）"
  - from: realm:yuanying
    to: divine_sense:yuanying
    type: enables
    description: "元婴期神识离体化（识战、夺舍、可触及天地法则）"

  # ── v1.6: 神识 → 应用 ──
  - from: divine_sense:jiedan
    to: artifact:tier_gao_jie
    type: enables
    description: "结丹神识可驱动高阶法器"
  - from: divine_sense:yuanying
    to: artifact:tier_fa_bao
    type: enables
    description: "元婴神识可驱动法宝，可与器灵沟通"
  - from: divine_sense:zhuji
    to: talisman:tier_ling_fu
    type: enables
    description: "筑基神识可画制灵品符箓"
  - from: divine_sense:jiedan
    to: talisman:tier_bao_fu
    type: enables
    description: "结丹神识可画制宝品符箓"
  - from: divine_sense:zhuji
    to: elixir:tier_ling_pin
    type: enables
    description: "筑基神识可炼制灵品丹药"
  - from: divine_sense:jiedan
    to: elixir:tier_bao_pin
    type: enables
    description: "结丹神识可炼制宝品丹药"
  - from: divine_sense:zhuji
    to: formation:tier_ling_zhen
    type: enables
    description: "筑基神识可布置灵阵"
  - from: divine_sense:jiedan
    to: formation:tier_bao_zhen
    type: enables
    description: "结丹神识可布置宝阵"

  # ── v1.6: 心魔 ↔ 神识 ──
  - from: divine_sense:yuanying
    to: heart_demon:all
    type: blocks
    description: "元婴期强大神识更难被心魔攻破"
  - from: heart_demon:chi_mo
    to: divine_sense:yuanying
    type: weakens
    description: "嗔魔爆发可短暂削弱神识强度"