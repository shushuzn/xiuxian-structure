# secret_realm.yaml — 秘境体系权威数据（v2.10 新增体系）

# 秘境形态分类
forms:
  - id: fu_dao
    name: 浮岛秘境
    description: 漂浮于空中或海面之上
    examples: [ling_yao_dao, xuan_tian_fei_kong_dao]
  - id: di_xia
    name: 地下秘境
    description: 藏于地下深处
    examples: [xuan_tie_kuang_mai, wan_nian_han_tie_kuang]
  - id: kong_zhong
    name: 空中秘境
    description: 漂浮于云端
    examples: [xuan_yu_gong]
  - id: kong_jian
    name: 空间秘境
    description: 独立于主世界的小世界
    examples: [kun_lun_dong_tian, peng_lai_xian_dao]
  - id: chuan_cheng
    name: 传承秘境
    description: 大能刻意留下的传承之地
    examples: [lei_shi_zhi_mu, san_xiu_yi_ji]
  - id: yao_xian
    name: 仙府秘境
    description: 仙界大能留在下界的洞府
    examples: [luo_yun_zong_zu_ting, xuan_du_dong_tian]

# 秘境开放方式
access_types:
  - id: zhou_qi
    name: 周期性开放
    description: 每 N 年开放 N 日
  - id: yong_jiu
    name: 永久开放
    description: 入口可寻，常年开放
  - id: yao_shi
    name: 钥匙进入
    description: 需特定钥匙/信物
  - id: ji_huo
    name: 一次性激活
    description: 触发后永不再开
  - id: tiao_jian
    name: 条件开放
    description: 满足修为/时间/事件条件
  - id: kua_jie
    name: 跨界进入
    description: 需元婴期以上穿界

# 秘境等级
grades:
  - id: fan_pin
    name: 凡品秘境
    required_realm: lianqi
    danger_level: 低
    expected_reward: "百年灵材"
  - id: ling_pin
    name: 灵品秘境
    required_realm: zhuji
    danger_level: 中
    expected_reward: "千年灵材"
  - id: bao_pin
    name: 宝品秘境
    required_realm: jiedan
    danger_level: 高
    expected_reward: "万年灵材 / 上古法器"
  - id: xian_pin
    name: 仙品秘境
    required_realm: yuanying
    danger_level: 极高
    expected_reward: "仙家灵物"
  - id: shen_pin
    name: 神品秘境
    required_realm: dacheng
    danger_level: 至高
    expected_reward: "神物"

# 资源类型
resource_types:
  - id: ling_yao
    name: 灵药类
    description: 灵草、灵果、灵花
  - id: ling_kuang
    name: 矿脉类
    description: 玄铁、星辰铁等
  - id: chong_shou
    name: 虫兽类
    description: 灵虫、灵兽
  - id: cheng_chuan
    name: 传承类
    description: 功法、法器、道心
  - id: tian_wai
    name: 天外类
    description: 跨界天外之物
  - id: shen_yi
    name: 神异类
    description: 法则具现之物

# 危险来源
dangers:
  - id: shou_hu_ling_shou
    name: 守护灵兽
    description: 上古灵兽后裔，修为极高
  - id: zhen_fa_xian_jing
    name: 阵法陷阱
    description: 上古杀阵，触动即触发
  - id: zi_ran_huan_jing
    name: 自然环境
    description: 灵气风暴、毒气、时空错乱
  - id: xiu_wei_ya_zhi
    name: 修为压制
    description: 禁止某境界以上进入
  - id: nei_bu_ren_wu
    name: 内部人物
    description: 守护者、考验者

# 著名秘境实例
