# tian_cai.yaml — 天材地宝体系权威数据（v2.11 新增体系）

# 形态分类
categories:
  - id: ling_cao
    name: 灵草类
    description: 草本灵药
    examples: [jiu_you_huan_hun_cao, qian_nian_xue_shen, qian_nian_ling_zhi, wan_nian_tai_sui]
  - id: ling_mu
    name: 灵木类
    description: 木本灵材
    examples: [wan_nian_ling_mu, lei_ji_mu, yang_hun_mu, hua_xing_ling_mu]
  - id: ling_jin_shu
    name: 灵金属类
    description: 金属矿石
    examples: [xuan_tie, wan_nian_han_tie, xing_chen_tie, jiu_tian_xuan_tie, shen_tie]
  - id: ling_shui_huo
    name: 灵水灵火类
    description: 液态/火焰型
    examples: [xuan_bing_zhen_shui, san_mei_zhen_huo, huang_quan_shui, nie_pan_huo]
  - id: ling_shou_chong
    name: 灵兽灵虫类
    description: 活物资源
    examples: [hua_xing_yao_dan, jiu_you_ming_she_dan, feng_huang_jing_xue, shi_jin_chong, long_ni_lin]
  - id: tian_wai
    name: 天外奇珍
    description: 跨界之物
    examples: [tian_wai_yun_tie, xing_chen_sui_pian, kua_jie_ling_wu, shi_guang_sha, kong_jian_jing_he]
  - id: xian_shen
    name: 仙材神材
    description: 仙神专属
    examples: [xian_shi, xian_yu, shen_shi, shen_yu, shen_cao, shen_tie]

