# time_space.yaml — 时空体系权威数据（v2.14 新增体系，最后一个体系）

# 法则等级
law_levels:
  - id: chu_ji
    name: 初级法则
    range: 化神期
    manifestation: 初步感知
  - id: zhong_ji
    name: 中级法则
    range: 炼虚期
    manifestation: 初步运用
  - id: gao_ji
    name: 高级法则
    range: 合体期
    manifestation: 熟练运用
  - id: jin_ji
    name: 禁忌法则
    range: 渡劫期
    manifestation: 高度掌握
  - id: zhi_gao
    name: 至高法则
    range: 大乘期
    manifestation: 完全掌握
  - id: chao_yue
    name: 超越法则
    range: 仙人+
    manifestation: 超越法则束缚

# 法则类型
law_types:
  - id: time
    name: 时间法则
    description: 掌控时间流速
    related_powers: [刹那永恒, 岁月如梭, 光阴逆转]
  - id: space
    name: 空间法则
    description: 操控空间维度
    related_powers: [空间瞬移, 空间切割, 空间禁锢]
  - id: space_time
    name: 时空法则
    description: 时间空间统一
    related_powers: [时空静止, 时空错乱, 时空湮灭]
  - id: void
    name: 虚空法则
    description: 界面之间
    related_powers: [虚空行走, 虚空吞噬, 虚空之眼]

