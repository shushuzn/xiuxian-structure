# zong_men.yaml — 宗门体系权威数据（v2.12 新增体系）

# 宗门等级
levels:
  - id: top
    name: 顶级宗门
    member_count: "50000+"
    max_realm: huashen
    lingmai_required: chao_ji_lingmai
    examples: [luo_yun_zong, tai_yi_gong]
  - id: large
    name: 大型宗门
    member_count: "5000-50000"
    max_realm: yuanying
    lingmai_required: da_xing_lingmai
    examples: [han_yan_zong, xiao_tian_lao_gong]
  - id: medium
    name: 中型宗门
    member_count: "500-5000"
    max_realm: jiedan
    lingmai_required: zhong_xing_lingmai
    examples: [tian_xia_shan, huo_yan_dong, luo_yan_zong]
  - id: small
    name: 小型宗门
    member_count: "10-500"
    max_realm: zhuji
    lingmai_required: xiao_xing_lingmai
    examples: [li_shi_jia, xuan_men]

# 弟子等级
disciple_levels:
  - id: wai_men
    name: 外门弟子
    position: 1
    privileges: 基础灵石
    required_realm: lianqi
  - id: nei_men
    name: 内门弟子
    position: 2
    privileges: 中级灵石 + 黄/玄级功法
    required_realm: zhuji
  - id: he_xin
    name: 核心弟子
    position: 3
    privileges: 高级灵石 + 地级功法
    required_realm: jiedan
  - id: zhen_chuan
    name: 真传弟子
    position: 4
    privileges: 顶级灵石 + 天级功法
    required_realm: yuanying

# 长老类型
elder_types:
  - id: chuan_gong
    name: 传功长老
    duty: 传授弟子功法
  - id: zhi_fa
    name: 执法长老
    duty: 执行宗规
  - id: zi_yuan
    name: 资源长老
    duty: 管理灵脉、灵石
  - id: wai_jiao
    name: 外交长老
    duty: 对外联络
  - id: hu_shan
    name: 护山长老
    duty: 守护宗门

# 掌门传承方式
succession_methods:
  - id: fu_zi
    name: 父子传承
    applicable: 家族式宗门
    pros: 稳定
    cons: 可能选错人
  - id: shi_tu
    name: 师徒传承
    applicable: 师徒型宗门
    pros: 培养成熟
    cons: 可能绝后
  - id: tui_ju
    name: 长老会推举
    applicable: 大型宗门
    pros: 民主
    cons: 可能分裂
  - id: shi_li
    name: 实力为王
    applicable: 魔道宗门
    pros: 强者为尊
    cons: 血腥
  - id: fei_sheng
    name: 飞升禅让
    applicable: 飞升型宗门
    pros: 稳定
    cons: 需提前规划

# 任务类型
task_types:
  - id: xiu_lian
    name: 修炼任务
    risk: low
    reward: 灵石、贡献点
  - id: cai_ji
    name: 采集任务
    risk: mid
    reward: 贡献点 + 采获分成
  - id: tan_xian
    name: 探险任务
    risk: high
    reward: 秘境内全部资源
  - id: zhan_dou
    name: 战斗任务
    risk: high
    reward: 战利品 + 军功
  - id: shou_hu
    name: 守护任务
    risk: mid
    reward: 固定贡献
  - id: wai_jiao
    name: 外交任务
    risk: low
    reward: 贡献 + 人脉

# 外交关系
foreign_relations:
  - pair: 落云宗 ↔ 太一宫
    type: friendly
    note: 正道友好
    id: luo_yun_tai_yi
  - pair: 落云宗 ↔ 寒焰宗
    type: competitive
    note: 资源竞争
    id: luo_yun_han_yan
  - pair: 落云宗 ↔ 潮汐宫
    type: hostile
    note: 妖修敌对
    id: luo_yun_chao_xi
  - pair: 太一宫 ↔ 魔教
    type: hostile
    note: 正邪对立
    id: tai_yi_mo_jiao
  - pair: 落云宗 ↔ 天星城商会
    type: economic
    note: 经济合作
    id: luo_yun_tian_xing
  - pair: 海上门派 ↔ 潮汐宫
    type: hostile
    note: 海妖威胁
    id: hai_shang_chao_xi

