<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修仙互动小说 · xiuxian-structure</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="bg-decoration"></div>

  <header>
    <h1>🎮 修仙互动小说</h1>
    <p class="subtitle">基于知识库驱动的状态机叙事</p>
  </header>

  <main id="app">
    <!-- 故事列表页 -->
    <section id="story-list" class="page">
      <h2>选择你的故事</h2>
      <div id="story-cards" class="cards"></div>
    </section>

    <!-- 游戏页 -->
    <section id="game" class="page hidden">
      <div class="game-header">
        <button class="btn-back" onclick="goHome()">← 返回故事列表</button>
        <h2 id="story-title"></h2>
        <p id="story-description" class="muted"></p>
      </div>

      <div class="game-body">
        <article class="story-panel">
          <div class="node-id" id="node-id"></div>
          <div class="story-text" id="story-text"></div>
          <div class="refs" id="refs"></div>
          <div class="choices" id="choices"></div>
          <div class="ending hidden" id="ending-banner">
            🏁 结局
            <button class="btn-restart" onclick="restart()">从头开始</button>
          </div>
        </article>

        <aside class="state-panel">
          <h3>📊 状态</h3>
          <div id="state-view"></div>
          <h3>🛤 走过的路</h3>
          <ol id="history-view"></ol>
          <button class="btn-restart" onclick="restart()">↺ 重启</button>
        </aside>
      </div>
    </section>

    <!-- Loading -->
    <div id="loading" class="hidden">⏳ 加载中…</div>
  </main>

  <footer>
    <p>数据驱动：<a href="https://github.com/shushuzn/xiuxian-structure">shushuzn/xiuxian-structure</a></p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
